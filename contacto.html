<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="style_index.css">
</head>

<body>
    <header class="header-bar">
        <div class="header-content">
            <img src="img/logo.png" alt="Logo" class="logo">
            <nav class="nav-links">
                <a href="index.html">Inicio</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="profile-card">
            <h3>Formulario de Contacto</h3>
            <form action="Informacion">
                <div>
                    <label for="Nombre">Nombre</label>
                    <input type="text" id="Nombre" placeholder="Ingresa tu nombre" name="Nombre">
                </div>
                <div>
                    <label for="Correo">Correo</label>
                    <input type="email" id="Correo" placeholder="Ingresa tu correo" name="Correo">
                </div>
                <div>
                    <label for="Mensaje">Mensaje</label>
                    <textarea id="Mensaje" placeholder="Escribe tu mensaje" name="Mensaje"></textarea>
                </div>
                <button type="submit">Enviar</button>
            </form>
        </div>
        </div>
    </main>

    <footer class="footer-bar">
        <p>Programación 2026</p>
    </footer>
</body>

</html>
